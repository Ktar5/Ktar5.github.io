---
layout: compress
---
<!DOCTYPE html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8"><![endif]-->
<!--[if (IE 8)&!(IEMobile)]><html class="no-js lt-ie9"><![endif]-->
<!--[if gt IE 8]><!-->
<html class="no-js">
<!--<![endif]-->

<head>
    {% include head.html %}
    <style>
        .headerImage {
            color: white!important;
            display: block;
            position: relative;
            height: 175px;
            overflow: hidden;
            transition: height 1s;
            margin: 0;
            padding: 0;
        }

        .headerImage:hover {
            height: 300px;
        }

        .headerImage:hover .card-overlay {
            opacity: 0;
        }

        .card-bg {
            position: absolute;
            inset: 0;
            background: center / cover;
            transition: 1s;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            transition: opacity 1s;
            z-index: 1;
        }

        .card-title-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            z-index: 2;
            padding-top: 2rem;
        }

        .posttitle {
            color: white!important;
            padding-left: 12px;
            padding-bottom: 10px;
            font-size: 28px;
            line-height: 1.2;
            margin: 0;
        }
    </style>
</head>

<body>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <header class="header" role="banner">
        <div class="wrapper animated fadeIn" style="position: relative;">
            <a class="btn zoombtn" style="position: absolute; opacity: 0.8; background: none; left: 0px; top: -4px; border: none;" href="{{site.url}}">
                <i class="fa fa-home fa-2x"></i>
            </a>
            <div class="content">
                <div class="post-title">
                    <h1>{{ page.title }}</h1>
                </div>
                <div class="post-list">
                    {% for post in site.posts %}
                    {% if post.project %}
                    <ul>
                        <li something="{% increment counter %}">
                            <div class="mdl-card mdl-shadow--2dp" style="width: 100%; overflow: hidden; position: relative; border-radius: 8px; margin: 0; padding: 0; background: transparent; min-height: 0; font-size: 0; line-height: 0;">
                                {% if post.video %}
                                <a href="{{ site.url }}{{ post.url }}" class="headerImage" style="height: 220px;">
                                    <video autoplay muted loop playsinline style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; z-index: 0;"></video>
                                    <div class="card-overlay"></div>
                                    <div class="card-title-bar">
                                        <h2 class="mdl-card__title-text posttitle">{{ post.title }}</h2>
                                    </div>
                                </a>
                                {% else %}
                                <a href="{{ site.url }}{{ post.url }}" class="headerImage">
                                    <div class="card-bg" style="background-image: url('{{post.img}}');"></div>
                                    <div class="card-overlay"></div>
                                    <div class="card-title-bar">
                                        <h2 class="mdl-card__title-text posttitle">{{ post.title }}</h2>
                                    </div>
                                </a>
                                {% endif %}
                                <div class="mdl-card__supporting-text" style="padding: 0.6rem 1.25rem; background-color: #f5f5f5; width: 100%; font-size: 1rem; line-height: 1.4; color: #1e2d3d;">
                                    {{ post.excerpt }}
                                </div>
                            </div>
                        </li>
                    </ul>
                    {% endif %}
                    {% endfor %}
                </div>
            </div>
        </div>
    </header>
    {% include scripts.html %}
    <script src="{{ site.url }}/assets/js/wow.min.js"></script>
    <script type="text/javascript">
    (new WOW).init();
    </script>
</body>

</html>
